name: Run Shiny App Tests

on: [push, pull_request]

jobs:
  test:
  runs-on: ubuntu-latest
container: rocker/geospatial:latest # Pre-loaded with sf, GDAL, and PROJ

steps:
  - name: Checkout Code
uses: actions/checkout@v3

- name: Install System Dependencies
run: |
  apt-get update && apt-get install -y libcurl4-openssl-dev libssl-dev

- name: Install R Packages
run: |
  R -e "install.packages(c('testthat', 'shiny', 'terra', 'sf', 'rstac', 'shinytest2'))"

- name: Execute Test Suite
run: |
  R -e "testthat::test_local()"